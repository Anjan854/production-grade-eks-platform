apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: monitoring
  namespace: argocd

spec:
  project: default

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true

  sources:

    # Source 1
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: 77.12.0

      helm:
        valueFiles:
          - $values/argocd/monitoring/values.yaml

    # Source 2
    - repoURL: https://github.com/Anjan854/production-grade-eks-platform.git
      targetRevision: main
      ref: values