version: "3.9"

services:
  frontend:
    container_name: frontend
    build: 
      context: ./microservices/src/frontend
      dockerfile: Dockerfile
    environment:
      PORT: "8080"

      PRODUCT_CATALOG_SERVICE_ADDR: "productcatalogservice:3550"
      CURRENCY_SERVICE_ADDR: "currencyservice:7000"
      CART_SERVICE_ADDR: "cartservice:7070"
      RECOMMENDATION_SERVICE_ADDR: "recommendationservice:8080"
      SHIPPING_SERVICE_ADDR: "shippingservice:50051"
      CHECKOUT_SERVICE_ADDR: "checkoutservice:5050"
      AD_SERVICE_ADDR: "adservice:9555"
      SHOPPING_ASSISTANT_SERVICE_ADDR: "shoppingassistantservice:8080"
      ENABLE_PROFILER: "0"

    depends_on:
      - productcatalogservice
      - currencyservice
      - cartservice
      - recommendationservice
      - shippingservice
      - checkoutservice
      - adservice
      - shoppingassistantservice

    networks:
      - microservices-network

  productcatalogservice:
    container_name: productcatalogservice
    build: 
      context: ./microservices/src/productcatalogservice
      dockerfile: Dockerfile

    environment:
      PORT: "3550"
      DISABLE_PROFILER: "1"
    
    networks:
      - microservices-network
    
  shoppingassistantservice:
    container_name: shoppingassistantservice
    build: 
      context: ./microservices/src/shoppingassistantservice
      dockerfile: Dockerfile
    networks:
      - microservices-network

    environment:
      PORT: "8080"
      DISABLE_PROFILER: "1"

  currencyservice:
    container_name: currencyservice
    build: 
      context: ./microservices/src/currencyservice
      dockerfile: Dockerfile
    environment:
      PORT: "7000"
      DISABLE_PROFILER: "1"
    networks:
      - microservices-network

  cartservice:
    container_name: cartservice
    platform: linux/amd64
    build: 
      context: ./microservices/src/cartservice
      dockerfile: Dockerfile
    environment: 
      PORT: "7070"
      REDIS_ADDR: "redis-cart:6379"
    depends_on:
      - redis-cart
    networks:
      - microservices-network

  redis-cart:
    container_name: redis-cart
    image: redis:alpine
    volumes:
      - redis-cart-data:/data
    networks:
      - microservices-network

  recommendationservice:
    container_name: recommendationservice
    build: 
      context: ./microservices/src/recommendationservice
      dockerfile: Dockerfile
    networks:
      - microservices-network
    environment:
      PORT: "8080"
      PRODUCT_CATALOG_SERVICE_ADDR: "productcatalogservice:3550"
      DISABLE_PROFILER: "1"

  shippingservice:
    container_name: shippingservice
    build: 
      context: ./microservices/src/shippingservice
      dockerfile: Dockerfile
    networks:
      - microservices-network
    environment:
      PORT: "50051"
      DISABLE_PROFILER: "1"

  paymentservice:
    container_name: paymentservice
    build: 
      context: ./microservices/src/paymentservice
      dockerfile: Dockerfile
    networks:
      - microservices-network
    environment:
      PORT: "50051"
      DISABLE_PROFILER: "1"

  emailservice:
    container_name: emailservice
    build: 
      context: ./microservices/src/emailservice
      dockerfile: Dockerfile
    networks:
      - microservices-network
    environment:
      PORT: "5000"
      DISABLE_PROFILER: "1"

  adservice:
    container_name: adservice
    build: 
      context: ./microservices/src/adservice
      dockerfile: Dockerfile
    networks:
      - microservices-network
    environment:
      PORT: "9555"

  checkoutservice:
    container_name: checkoutservice
    build: 
      context: ./microservices/src/checkoutservice
      dockerfile: Dockerfile
    networks:
      - microservices-network
    environment:
      PORT: "5050"
      PRODUCT_CATALOG_SERVICE_ADDR: "productcatalogservice:3550"
      SHIPPING_SERVICE_ADDR: "shippingservice:50051"
      PAYMENT_SERVICE_ADDR: "paymentservice:50051"
      EMAIL_SERVICE_ADDR: "emailservice:5000"
      CURRENCY_SERVICE_ADDR: "currencyservice:7000"
      CART_SERVICE_ADDR: "cartservice:7070"

    depends_on:
      - productcatalogservice
      - shippingservice
      - paymentservice
      - emailservice
      - currencyservice
      - cartservice

  nginx:
    container_name: nginx
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
    networks:
      - microservices-network
  
networks:
  microservices-network:
    driver: bridge

volumes:
  redis-cart-data:
    